<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// --- ฟังก์ชัน Error แสดงผล ---
function showError(msg) {
  document.getElementById('startup-error').classList.remove('hidden');
  document.getElementById('error-text').innerHTML = String(msg);
}

// =========================================================================
// 🎨 SVG Icons
// =========================================================================
const IconCrown     = () => <svg className="w-8 h-8 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" /></svg>;
const IconArrowLeft = () => <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>;
const IconChevRight = () => <svg className="w-4 h-4 text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7" /></svg>;
const IconUpload    = () => <svg className="w-8 h-8 text-neutral-400 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>;
const IconCheck     = () => <svg className="w-12 h-12 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7" /></svg>;

// =========================================================================
// 🔄 Loading Screen
// =========================================================================
function LoadingScreen() {
  return (
    <div className="flex flex-col items-center justify-center min-h-screen bg-neutral-50">
      <div className="w-10 h-10 border-4 border-black border-t-transparent rounded-full animate-spin"></div>
      <p className="text-xs text-neutral-400 mt-4">กำลังโหลด...</p>
    </div>
  );
}

// =========================================================================
// 🏠 App Root
// =========================================================================
function App() {
  const [tgUser,   setTgUser]   = useState(null);
  const [role,     setRole]     = useState('loading');
  const [userData, setUserData] = useState(null);
  const [packages, setPackages] = useState([]);
  const [settings, setSettings] = useState({ pageA:'', pageB:'', pageC:'', pageD:'' });

  useEffect(() => {
    if (!db) {
      showError("เชื่อมต่อ Firebase ไม่สำเร็จ — กรุณาตรวจสอบ Firebase Config");
      setRole('error');
      return;
    }

    // ✅ FIX: ดึง user จาก Telegram WebApp หรือใช้ค่า mock เมื่อเปิดนอก Telegram
    const tg   = window.Telegram?.WebApp;
    const tgSDK = tg?.initDataUnsafe;
    let user    = tgSDK?.user;

    if (!user) {
      // Mock user สำหรับทดสอบใน browser ปกติ
      user = { id: 12345678, first_name: "ผู้ใช้ทดสอบ", username: "sandbox" };
    }

    if (tg && typeof tg.expand === 'function') tg.expand();
    setTgUser(user);

    // ✅ บันทึกการเข้าใช้งาน (ไม่ await เพื่อไม่บล็อก UI)
    db.collection('all_users').doc(user.id.toString()).set({
      id: user.id.toString(),
      name: user.first_name,
      lastSeen: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true }).catch(() => {});

    // --- ตรวจสิทธิ์ ---
    if (user.id.toString() === ADMIN_TG_ID) {
      setRole('admin');
      return;
    }

    // ✅ ใช้ onSnapshot เพื่อฟังสิทธิ์แบบ real-time
    const unsub = db.collection('users').doc(user.id.toString()).onSnapshot(
      (doc) => {
        if (doc.exists) {
          const data = doc.data();
          if (data.status === 'active' && data.expiryDate) {
            const expiry = data.expiryDate.toDate ? data.expiryDate.toDate() : new Date(data.expiryDate);
            if (expiry > new Date()) {
              setUserData(data);
              setRole('member');
              return;
            }
          }
        }
        setRole('guest');
      },
      (err) => {
        showError("Firestore Rules ยังไม่เปิด Public: " + err.message);
        setRole('guest');
      }
    );

    return () => unsub();
  }, []);

  // โหลดข้อมูล system settings
  useEffect(() => {
    if (!db) return;
    const unsub = db.collection('system').doc('settings').onSnapshot(doc => {
      if (doc.exists) {
        const d = doc.data();
        setSettings(d.textSettings || {});
        setPackages(d.packages || []);
      } else {
        // สร้างค่า default ถ้ายังไม่มี
        const defaults = {
          packages: [
            { id:"pkg_1", name:"แพ็กเกจเริ่มต้น",  price:300,  days:30  },
            { id:"pkg_2", name:"แพ็กเกจสุดคุ้ม",   price:800,  days:90  },
            { id:"pkg_3", name:"แพ็กเกจรายปี",      price:2500, days:365 }
          ],
          textSettings: {
            pageA: 'ยินดีต้อนรับ! เลือกแพ็กเกจ VIP ที่ต้องการ',
            pageB: 'โอนเข้าบัญชีธนาคาร\nธนาคาร: กสิกรไทย\nชื่อบัญชี: ...\nเลขบัญชี: ...',
            pageC: 'เบอร์ TrueMoney Wallet: 0xx-xxx-xxxx',
            pageD: 'บัญชี Paypal: example@email.com'
          }
        };
        db.collection('system').doc('settings').set(defaults);
        setSettings(defaults.textSettings);
        setPackages(defaults.packages);
      }
    }, () => {});
    return () => unsub();
  }, []);

  if (role === 'loading') return <LoadingScreen />;
  if (role === 'error')   return null; // error overlay จะแสดงแทน

  return (
    <div className="max-w-md mx-auto min-h-screen bg-neutral-50 flex flex-col">
      {role === 'admin'  && <AdminView  tgUser={tgUser} packages={packages} settings={settings} />}
      {role === 'member' && <MemberView user={userData} />}
      {role === 'guest'  && <GuestView  tgUser={tgUser} packages={packages} settings={settings} />}
    </div>
  );
}

// =========================================================================
// 👤 GuestView — หน้าเลือกแพ็กเกจและส่งสลิป
// =========================================================================
function GuestView({ tgUser, packages, settings }) {
  const [step,         setStep]         = useState(1);
  const [selectedPkg,  setSelectedPkg]  = useState(null);
  const [payMethod,    setPayMethod]    = useState('');
  const [slipBase64,   setSlipBase64]   = useState('');
  const [slipMeta,     setSlipMeta]     = useState(null);
  const [transferTime, setTransferTime] = useState('');
  const [isSubmitting, setIsSubmitting] = useState(false);

  const handleFileChange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    // ✅ ตรวจขนาดไฟล์ (จำกัด 5MB)
    if (file.size > 5 * 1024 * 1024) {
      alert("ไฟล์ขนาดใหญ่เกินไป กรุณาเลือกรูปขนาดไม่เกิน 5MB");
      return;
    }
    const reader = new FileReader();
    reader.onloadend = () => {
      setSlipBase64(reader.result);
      setSlipMeta({ name: file.name, type: file.type });
    };
    reader.readAsDataURL(file);
  };

  const handleSubmit = async () => {
    if (!slipBase64)   return alert("กรุณาแนบภาพสลิป");
    if (!transferTime) return alert("กรุณาระบุเวลาโอน");

    setIsSubmitting(true);
    try {
      // 1. อัปโหลดสลิปไปยัง GAS → Google Drive
      const res = await fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        body: JSON.stringify({
          action:   'upload_slip',
          base64:   slipBase64,
          mimeType: slipMeta.type,
          fileName: `Slip_${tgUser.id}_${Date.now()}`
        })
      });
      const resJson = await res.json();
      if (!resJson.success) throw new Error(resJson.error || "อัปโหลดสลิปไม่สำเร็จ");

      // 2. บันทึกลง Firestore
      await db.collection('transactions').add({
        userId:       tgUser.id.toString(),
        userName:     tgUser.first_name,
        package:      selectedPkg,
        paymentMethod: payMethod,
        slipUrl:      resJson.fileUrl,
        transferTime: transferTime,
        status:       'pending',
        timestamp:    firebase.firestore.FieldValue.serverTimestamp()
      });

      setStep(4);
    } catch (err) {
      alert("เกิดข้อผิดพลาด: " + err.message);
    } finally {
      setIsSubmitting(false);
    }
  };

  const paymentPages = { bank: settings.pageB, wallet: settings.pageC, paypal: settings.pageD };

  return (
    <div className="flex-1 flex flex-col p-5">
      {/* Header */}
      <div className="text-center my-6">
        <div className="inline-block bg-black text-white p-3 rounded-full mb-3"><IconCrown /></div>
        <h1 className="text-xl font-extrabold uppercase">VIP MEMBER</h1>
      </div>

      {/* Step 1 — เลือกแพ็กเกจ */}
      {step === 1 && (
        <div className="space-y-3 flex-1">
          {settings.pageA && (
            <div className="bg-white p-4 rounded-xl text-sm border border-neutral-100 whitespace-pre-line mb-4">
              {settings.pageA}
            </div>
          )}
          {packages.length === 0 && (
            <p className="text-center text-neutral-400 text-sm py-8">กำลังโหลดแพ็กเกจ...</p>
          )}
          {packages.map(pkg => (
            <div key={pkg.id}
              onClick={() => { setSelectedPkg(pkg); setStep(2); }}
              className="bg-white border-2 border-neutral-200 hover:border-black p-4 rounded-xl flex justify-between items-center cursor-pointer shadow-sm active:scale-95 transition-transform">
              <div>
                <div className="font-bold">{pkg.name}</div>
                <div className="text-xs text-neutral-500">{pkg.days} วัน</div>
              </div>
              <div className="font-extrabold text-lg">{pkg.price} ฿</div>
            </div>
          ))}
        </div>
      )}

      {/* Step 2 — เลือกช่องทางชำระเงิน */}
      {step === 2 && (
        <div className="space-y-3">
          <button onClick={() => setStep(1)} className="flex items-center text-xs text-neutral-500 mb-4">
            <IconArrowLeft /> กลับ
          </button>
          <div className="bg-black text-white p-4 rounded-xl mb-4 text-center">
            <h3 className="font-bold text-lg">{selectedPkg?.name}</h3>
            <div className="text-2xl font-black">{selectedPkg?.price} ฿</div>
            <div className="text-xs text-neutral-400 mt-1">{selectedPkg?.days} วัน</div>
          </div>
          {[
            { key:'bank',   label:'🏦 โอนผ่านบัญชีธนาคาร' },
            { key:'wallet', label:'📱 ทรูมันนี่วอลเล็ต' },
            { key:'paypal', label:'💳 ชำระผ่าน Paypal' }
          ].map(opt => (
            <div key={opt.key}
              onClick={() => { setPayMethod(opt.key); setStep(3); }}
              className="p-4 bg-white border border-neutral-200 rounded-xl flex justify-between items-center cursor-pointer active:bg-neutral-50">
              <span className="font-bold text-sm">{opt.label}</span>
              <IconChevRight />
            </div>
          ))}
        </div>
      )}

      {/* Step 3 — แนบสลิป */}
      {step === 3 && (
        <div className="space-y-4">
          <button onClick={() => setStep(2)} className="flex items-center text-xs text-neutral-500">
            <IconArrowLeft /> เปลี่ยนช่องทาง
          </button>
          <div className="bg-white border border-neutral-200 p-5 rounded-xl text-sm whitespace-pre-line">
            {paymentPages[payMethod] || '-'}
          </div>
          <div className="bg-white border border-neutral-200 p-5 rounded-xl space-y-4">
            <div>
              <label className="block text-xs font-semibold mb-2">แนบภาพสลิป (ไม่เกิน 5MB)</label>
              <label className="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed rounded-lg cursor-pointer hover:bg-neutral-50 active:bg-neutral-100">
                <IconUpload />
                <p className="text-xs text-neutral-500">{slipMeta ? slipMeta.name : "แตะเพื่อเลือกรูปภาพ"}</p>
                {slipBase64 && <p className="text-xs text-green-600 mt-1">✓ โหลดสำเร็จ</p>}
                <input type="file" accept="image/*" onChange={handleFileChange} className="hidden" />
              </label>
            </div>
            <div>
              <label className="block text-xs font-semibold mb-2">เวลาโอน (ชั่วโมง:นาที)</label>
              <input type="time" value={transferTime} onChange={e => setTransferTime(e.target.value)}
                className="w-full border rounded-lg p-2.5 text-sm" />
            </div>
          </div>
          <button onClick={handleSubmit} disabled={isSubmitting}
            className="w-full bg-black text-white py-3 rounded-lg font-bold text-sm disabled:opacity-50 active:scale-95 transition-transform">
            {isSubmitting ? "กำลังส่งข้อมูล..." : "แจ้งโอนเงิน"}
          </button>
        </div>
      )}

      {/* Step 4 — สำเร็จ */}
      {step === 4 && (
        <div className="text-center p-6 bg-white border border-neutral-200 rounded-xl mt-6">
          <div className="flex justify-center mb-4"><IconCheck /></div>
          <h2 className="text-lg font-bold">บันทึกข้อมูลสำเร็จ!</h2>
          <p className="text-sm text-neutral-500 mt-2">กรุณารอแอดมินตรวจสอบ ระบบจะส่งลิงก์เข้ากลุ่มให้ทางแชทครับ</p>
        </div>
      )}
    </div>
  );
}

// =========================================================================
// 💎 MemberView — บัตรสมาชิก VIP
// =========================================================================
function MemberView({ user }) {
  if (!user) return <LoadingScreen />;

  const expiry = user.expiryDate
    ? (user.expiryDate.toDate ? user.expiryDate.toDate() : new Date(user.expiryDate))
    : new Date();
  const daysLeft = Math.max(0, Math.ceil((expiry - new Date()) / 86400000));

  return (
    <div className="flex-1 p-5 flex flex-col justify-center">
      <div className="bg-white border-2 border-black rounded-2xl p-6 shadow-md text-center">
        <span className="text-[10px] font-black uppercase text-neutral-400">VIP MEMBER PASS</span>
        <h2 className="text-2xl font-black mt-1">{user.name}</h2>
        <div className="my-6 bg-neutral-50 p-4 rounded-xl border border-neutral-100">
          <span className="text-xs text-neutral-400 font-semibold">วันใช้งานคงเหลือ</span>
          <div className="text-5xl font-extrabold mt-1">{daysLeft}</div>
          <div className="text-xs text-neutral-500 mt-1">วัน</div>
        </div>
        <div className="text-xs text-neutral-600 text-left space-y-2 border-t pt-4">
          <div className="flex justify-between">
            <span>แพ็กเกจ</span>
            <span className="font-bold">{user.package?.name}</span>
          </div>
          <div className="flex justify-between">
            <span>หมดอายุ</span>
            <span className="font-bold">{expiry.toLocaleDateString('th-TH')}</span>
          </div>
        </div>
      </div>
    </div>
  );
}

// =========================================================================
// 🛠️ AdminView — แผงควบคุม Admin
// =========================================================================
function AdminView({ packages, settings }) {
  const [tab,        setTab]        = useState('pending');
  const [pendingTxs, setPendingTxs] = useState([]);
  const [members,    setMembers]    = useState([]);
  const [broadcast,  setBroadcast]  = useState('');
  const [allUsers,   setAllUsers]   = useState([]);
  const [isSending,  setIsSending]  = useState(false);

  const [tempSettings, setTempSettings] = useState({ pageA:'', pageB:'', pageC:'', pageD:'' });
  useEffect(() => { setTempSettings(settings); }, [settings]);

  useEffect(() => {
    if (!db) return;
    const unsubTxs = db.collection('transactions').where('status','==','pending')
      .orderBy('timestamp','desc')
      .onSnapshot(snap => setPendingTxs(snap.docs.map(d => ({ id:d.id, ...d.data() }))));
    const unsubMembers = db.collection('users')
      .onSnapshot(snap => setMembers(snap.docs.map(d => ({ id:d.id, ...d.data() }))));
    const unsubAllUsers = db.collection('all_users')
      .onSnapshot(snap => setAllUsers(snap.docs.map(d => d.data())));
    return () => { unsubTxs(); unsubMembers(); unsubAllUsers(); };
  }, []);

  const handleApprove = async (tx) => {
    if (!window.confirm("อนุมัติรายการนี้ใช่หรือไม่?")) return;
    try {
      const res  = await fetch(GAS_WEB_APP_URL, { method:'POST', body: JSON.stringify({ action:'approve', tgUserId: tx.userId }) });
      const json = await res.json();
      if (!json.success) throw new Error(json.error || "GAS Error");

      await db.collection('transactions').doc(tx.id).update({ status:'approved' });

      const expiry = new Date();
      expiry.setDate(expiry.getDate() + parseInt(tx.package?.days || 30));
      await db.collection('users').doc(tx.userId).set({
        userId: tx.userId, name: tx.userName, status:'active',
        package: tx.package, expiryDate: expiry
      }, { merge: true });

      alert("อนุมัติสำเร็จ! ลิงก์เข้ากลุ่มถูกส่งไปยังผู้ใช้แล้ว");
    } catch(err) { alert("ล้มเหลว: " + err.message); }
  };

  const handleReject = async (tx) => {
    if (!window.confirm("ปฏิเสธรายการนี้ใช่หรือไม่?")) return;
    try {
      await fetch(GAS_WEB_APP_URL, { method:'POST', body: JSON.stringify({ action:'reject', tgUserId: tx.userId }) });
      await db.collection('transactions').doc(tx.id).update({ status:'rejected' });
    } catch(err) { alert("ล้มเหลว: " + err.message); }
  };

  const handleSaveSettings = async () => {
    try {
      await db.collection('system').doc('settings').update({ textSettings: tempSettings });
      alert("บันทึกสำเร็จ");
    } catch(err) { alert("เกิดข้อผิดพลาด: " + err.message); }
  };

  const handleBroadcast = async () => {
    if (!broadcast.trim()) return alert("กรุณาพิมพ์ข้อความ");
    if (!window.confirm(`ส่งข้อความถึงผู้ใช้ ${allUsers.length} คน ใช่หรือไม่?`)) return;
    setIsSending(true);
    try {
      const res  = await fetch(GAS_WEB_APP_URL, { method:'POST', body: JSON.stringify({
        action: 'broadcast',
        users:  allUsers.map(u => u.id),
        message: broadcast
      })});
      const json = await res.json();
      alert(`ส่งสำเร็จ ${json.sentCount} / ${allUsers.length} คน`);
      setBroadcast('');
    } catch(err) { alert("ล้มเหลว: " + err.message); }
    finally { setIsSending(false); }
  };

  const tabs = [
    { key:'pending',   label:`รออนุมัติ (${pendingTxs.length})` },
    { key:'members',   label:`สมาชิก (${members.length})` },
    { key:'broadcast', label:'บรอดแคสต์' },
    { key:'settings',  label:'ตั้งค่า' }
  ];

  return (
    <div className="flex-1 flex flex-col">
      <div className="bg-black text-white p-4 font-bold text-sm">ADMIN DASHBOARD</div>

      {/* Tab bar — scroll ได้ถ้าหน้าจอแคบ */}
      <div className="flex bg-white border-b overflow-x-auto sticky top-0 z-10">
        {tabs.map(t => (
          <button key={t.key} onClick={() => setTab(t.key)}
            className={`flex-shrink-0 px-3 py-3 text-xs font-bold whitespace-nowrap ${tab===t.key ? 'border-b-2 border-black' : 'text-neutral-400'}`}>
            {t.label}
          </button>
        ))}
      </div>

      <div className="p-4 overflow-y-auto">
        {/* Tab: รออนุมัติ */}
        {tab === 'pending' && (
          pendingTxs.length === 0
            ? <p className="text-center text-neutral-400 text-sm py-8">ไม่มีรายการรออนุมัติ</p>
            : pendingTxs.map(tx => (
              <div key={tx.id} className="bg-white p-4 rounded-xl border mb-3">
                <h4 className="font-bold">{tx.userName}</h4>
                <div className="text-xs my-2 text-neutral-600 space-y-1">
                  <div>แพ็กเกจ: <strong>{tx.package?.name}</strong></div>
                  <div>เวลาโอน: <strong>{tx.transferTime} น.</strong></div>
                  <div>ช่องทาง: <strong>{tx.paymentMethod}</strong></div>
                </div>
                {tx.slipUrl && (
                  <a href={tx.slipUrl} target="_blank" rel="noreferrer"
                    className="text-blue-500 text-xs underline block mb-3">
                    🖼 ดูสลิปโอนเงิน
                  </a>
                )}
                <div className="flex space-x-2">
                  <button onClick={() => handleApprove(tx)}
                    className="flex-1 bg-black text-white py-2 rounded text-xs font-bold">อนุมัติ</button>
                  <button onClick={() => handleReject(tx)}
                    className="flex-1 bg-red-500 text-white py-2 rounded text-xs font-bold">ปฏิเสธ</button>
                </div>
              </div>
            ))
        )}

        {/* Tab: สมาชิก */}
        {tab === 'members' && (
          members.length === 0
            ? <p className="text-center text-neutral-400 text-sm py-8">ยังไม่มีสมาชิก</p>
            : members.map(m => {
              const expiry = m.expiryDate?.toDate ? m.expiryDate.toDate() : (m.expiryDate ? new Date(m.expiryDate) : null);
              const daysLeft = expiry ? Math.max(0, Math.ceil((expiry - new Date()) / 86400000)) : '-';
              return (
                <div key={m.id} className="bg-white p-3 rounded border mb-2 flex justify-between items-center">
                  <div>
                    <span className="font-bold text-sm">{m.name}</span>
                    <div className="text-xs text-neutral-400">เหลือ {daysLeft} วัน</div>
                  </div>
                  <span className={`text-xs px-2 py-1 rounded font-bold ${m.status==='active' ? 'bg-black text-white' : 'bg-red-100 text-red-700'}`}>
                    {m.status}
                  </span>
                </div>
              );
            })
        )}

        {/* Tab: Broadcast */}
        {tab === 'broadcast' && (
          <div className="bg-white p-4 rounded border space-y-3">
            <div className="text-xs text-neutral-500">ส่งข้อความถึงผู้ใช้ทั้งหมด: <strong>{allUsers.length} คน</strong></div>
            <textarea
              value={broadcast}
              onChange={e => setBroadcast(e.target.value)}
              placeholder="พิมพ์ข้อความที่ต้องการส่ง..."
              rows={5}
              className="w-full border rounded p-2 text-sm"
            />
            <div className="text-xs text-neutral-400">รองรับ Markdown เช่น *ตัวหนา* _ตัวเอียง_</div>
            <button onClick={handleBroadcast} disabled={isSending}
              className="w-full bg-black text-white py-2 rounded font-bold text-sm disabled:opacity-50">
              {isSending ? "กำลังส่ง..." : `📢 ส่งทันที`}
            </button>
          </div>
        )}

        {/* Tab: ตั้งค่า */}
        {tab === 'settings' && (
          <div className="bg-white p-4 rounded border space-y-3">
            {[
              { key:'pageA', label:'หน้า A — ข้อความต้อนรับ' },
              { key:'pageB', label:'หน้า B — บัญชีธนาคาร' },
              { key:'pageC', label:'หน้า C — TrueMoney' },
              { key:'pageD', label:'หน้า D — Paypal' }
            ].map(item => (
              <div key={item.key}>
                <label className="text-xs font-bold">{item.label}</label>
                <textarea
                  value={tempSettings[item.key] || ''}
                  onChange={e => setTempSettings(prev => ({ ...prev, [item.key]: e.target.value }))}
                  rows={3}
                  className="w-full border p-2 text-sm mt-1 rounded"
                />
              </div>
            ))}
            <button onClick={handleSaveSettings}
              className="w-full bg-black text-white py-2 rounded font-bold text-sm">
              💾 บันทึกการตั้งค่า
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// =========================================================================
// 🚀 Mount React App
// =========================================================================
try {
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
} catch(e) {
  showError("React mount failed: " + e.message);
}
</script>
</body>
</html>
