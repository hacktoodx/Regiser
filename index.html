<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP Group Subscription</title>
    
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK (Compat Version สำหรับ HTML) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        // ระบบดักจับข้อผิดพลาดฉุกเฉิน
        window.onerror = function(message, source, lineno, colno, error) {
            const errDiv = document.getElementById('startup-error');
            const errText = document.getElementById('error-text');
            if (errDiv && errText) {
                errDiv.classList.remove('hidden');
                errText.innerHTML = "<strong>System Crash Log:</strong><br>" + message + 
                                    "<br><br><small class='text-neutral-500'>บรรทัดที่: " + lineno + "</small>";
            }
            return false;
        };
    </script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #fafafa;
            color: #171717;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="antialiased select-none">
    
    <div id="startup-error" class="hidden p-6 text-center bg-red-50 min-h-screen flex flex-col justify-center items-center z-50 absolute w-full h-full">
        <div class="text-red-500 text-5xl mb-4">⚠️</div>
        <h1 class="text-lg font-bold text-red-700">พบข้อผิดพลาดในการโหลดระบบ</h1>
        <p id="error-text" class="text-sm text-neutral-600 mt-2 max-w-xs leading-relaxed font-mono text-left bg-neutral-100 p-3 rounded border border-neutral-200 overflow-auto w-full"></p>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // ⚠️ 1. แก้ไขค่า 2 บรรทัดนี้ให้เป็นข้อมูลของคุณ
        // ==========================================
const ADMIN_TG_ID = "7234688831"; // ค้นหา ID ด้วยบอท @userinfobot
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwWHgk7NMjiK0Sj0vsyHAMES53ihXv15WDKZSK2mBiU_i0YW7tF5vhe4sDLtWraVHcn/exec"; // ลิงก์ที่ได้จากการ Deploy ใน GAS


        // ==========================================
        // ⚠️ 2. ข้อมูล Firebase ของคุณ (ไม่ต้องแก้)
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAxHBeocnF00uoHiMUqMyY2ZgAx9ALVFQI",
            authDomain: "hacktood-member.firebaseapp.com",
            projectId: "hacktood-member",
            storageBucket: "hacktood-member.firebasestorage.app",
            messagingSenderId: "67545978384",
            appId: "1:67545978384:web:5e13a0549263fadb7d5c95",
            measurementId: "G-Q430JLX5J7"
        };

        let db;
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
        } catch (e) {
            document.getElementById('startup-error').classList.remove('hidden');
            document.getElementById('error-text').innerText = "เชื่อมต่อ Firebase ไม่สำเร็จ: " + e.message;
        }

        const { useState, useEffect } = React;

        // --- ไอคอนภาพวาด SVG ---
        const IconCrown = () => <svg className="w-8 h-8 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" /></svg>;
        const IconArrowLeft = () => <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>;
        const IconChevronRight = () => <svg className="w-4 h-4 text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7" /></svg>;
        const IconUpload = () => <svg className="w-8 h-8 text-neutral-400 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>;
        const IconCheck = () => <svg className="w-12 h-12 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7" /></svg>;

        function App() {
            const [tgUser, setTgUser] = useState(null);
            const [role, setRole] = useState('loading'); 
            const [userData, setUserData] = useState(null);
            const [packages, setPackages] = useState([]);
            const [settings, setSettings] = useState({ pageA: '', pageB: '', pageC: '', pageD: '' });

            useEffect(() => {
                if (!db) return;

                const tg = window.Telegram?.WebApp;
                if (tg) tg.expand();
                
                let user = tg?.initDataUnsafe?.user;
                if (!user) user = { id: "12345678", first_name: "ผู้ใช้ทดสอบ", username: "sandbox" };
                setTgUser(user);

                if (user.id.toString() === ADMIN_TG_ID.toString()) {
                    setRole('admin');
                } else {
                    db.collection('users').doc(user.id.toString()).onSnapshot((doc) => {
                        if (doc.exists) {
                            const data = doc.data();
                            if (data.status === 'active' && data.expiryDate) {
                                const expiry = data.expiryDate.toDate();
                                if (expiry > new Date()) {
                                    setUserData(data);
                                    setRole('member');
                                    return;
                                }
                            }
                        }
                        setRole('guest');
                    }, (err) => {
                        alert("โปรดตั้งค่า Firestore Rules ให้เป็น Public");
                    });
                }

                db.collection('system').doc('settings').onSnapshot(doc => {
                    if (doc.exists) {
                        setSettings(doc.data().textSettings || {});
                        setPackages(doc.data().packages || []);
                    } else {
                        const defaultSettings = {
                            packages: [
                                { id: "pkg_1", name: "แพ็กเกจเริ่มต้น", price: 300, days: 30 },
                                { id: "pkg_2", name: "แพ็กเกจสุดคุ้ม", price: 800, days: 90 },
                                { id: "pkg_3", name: "แพ็กเกจรายปี", price: 2500, days: 365 }
                            ],
                            textSettings: {
                                pageA: 'ยินดีต้อนรับ! เลือกแพ็กเกจ VIP',
                                pageB: 'โอนเข้าบัญชีธนาคาร...',
                                pageC: 'เบอร์ TrueMoney...',
                                pageD: 'บัญชี Paypal...'
                            }
                        };
                        db.collection('system').doc('settings').set(defaultSettings);
                    }
                });
                
                db.collection('all_users').doc(user.id.toString()).set({
                    id: user.id.toString(),
                    name: user.first_name,
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true }).catch(e => console.log("log user skipped"));

            }, []);

            if (role === 'loading') {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen bg-neutral-50 px-6">
                        <div className="w-10 h-10 border-4 border-black border-t-transparent rounded-full animate-spin"></div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto min-h-screen bg-neutral-50 flex flex-col relative">
                    {role === 'admin' ? (
                        <AdminView tgUser={tgUser} packages={packages} settings={settings} />
                    ) : role === 'member' ? (
                        <MemberView user={userData} />
                    ) : (
                        <GuestView tgUser={tgUser} packages={packages} settings={settings} />
                    )}
                </div>
            );
        }

        function GuestView({ tgUser, packages, settings }) {
            const [step, setStep] = useState(1);
            const [selectedPkg, setSelectedPkg] = useState(null);
            const [paymentMethod, setPaymentMethod] = useState('');
            const [slipBase64, setSlipBase64] = useState('');
            const [slipMeta, setSlipMeta] = useState(null);
            const [transferTime, setTransferTime] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onloadend = () => {
                    setSlipBase64(reader.result);
                    setSlipMeta({ name: file.name, type: file.type });
                };
                reader.readAsDataURL(file);
            };

            const handleRequestJoin = async () => {
                if (!slipBase64) return alert("กรุณาแนบภาพสลิป");
                if (!transferTime) return alert("กรุณาระบุเวลาโอน");

                setIsSubmitting(true);
                try {
                    const res = await fetch(GAS_WEB_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: 'upload_slip',
                            base64: slipBase64,
                            mimeType: slipMeta.type,
                            fileName: `Slip_${tgUser.id}_${Date.now()}`
                        })
                    });
                    const resJson = await res.json();
                    
                    if (!resJson.success) throw new Error("อัปโหลดสลิปไม่สำเร็จ");

                    await db.collection('transactions').add({
                        userId: tgUser.id.toString(),
                        userName: tgUser.first_name,
                        package: selectedPkg,
                        paymentMethod: paymentMethod,
                        slipUrl: resJson.fileUrl,
                        transferTime: transferTime,
                        status: 'pending',
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setStep(4);
                } catch (error) {
                    alert("Error: " + error.message);
                } finally {
                    setIsSubmitting(false);
                }
            };

            return (
                <div className="flex-1 flex flex-col p-5">
                    <div className="text-center my-6">
                        <div className="inline-block bg-black text-white p-3 rounded-full mb-3"><IconCrown /></div>
                        <h1 className="text-xl font-extrabold uppercase">VIP MEMBER</h1>
                    </div>

                    {step === 1 && (
                        <div className="space-y-3 flex-1">
                            <div className="bg-white p-4 rounded-xl text-sm mb-6">{settings.pageA}</div>
                            {packages.map(pkg => (
                                <div key={pkg.id} onClick={() => { setSelectedPkg(pkg); setStep(2); }} className="bg-white border-2 border-neutral-200 hover:border-black p-4 rounded-xl flex justify-between items-center cursor-pointer shadow-sm">
                                    <div><div className="font-bold">{pkg.name}</div><div className="text-xs text-neutral-500">{pkg.days} วัน</div></div>
                                    <div className="font-extrabold text-lg">{pkg.price} ฿</div>
                                </div>
                            ))}
                        </div>
                    )}

                    {step === 2 && (
                        <div className="space-y-3">
                            <button onClick={() => setStep(1)} className="flex items-center text-xs text-neutral-500 mb-4"><IconArrowLeft /> กลับ</button>
                            <div className="bg-black text-white p-4 rounded-xl mb-4 text-center">
                                <h3 className="font-bold text-lg">{selectedPkg?.name}</h3>
                                <div className="text-2xl font-black">{selectedPkg?.price} ฿</div>
                            </div>
                            <div onClick={() => { setPaymentMethod('bank'); setStep(3); }} className="p-4 bg-white border border-neutral-200 rounded-xl flex justify-between cursor-pointer">
                                <span className="font-bold text-sm">🏦 โอนผ่านบัญชีธนาคาร</span><IconChevronRight />
                            </div>
                            <div onClick={() => { setPaymentMethod('wallet'); setStep(3); }} className="p-4 bg-white border border-neutral-200 rounded-xl flex justify-between cursor-pointer">
                                <span className="font-bold text-sm">📱 ทรูมันนี่วอลเล็ต</span><IconChevronRight />
                            </div>
                            <div onClick={() => { setPaymentMethod('paypal'); setStep(3); }} className="p-4 bg-white border border-neutral-200 rounded-xl flex justify-between cursor-pointer">
                                <span className="font-bold text-sm">💳 ชำระผ่าน Paypal</span><IconChevronRight />
                            </div>
                        </div>
                    )}

                    {step === 3 && (
                        <div className="space-y-4">
                            <button onClick={() => setStep(2)} className="flex items-center text-xs text-neutral-500"><IconArrowLeft /> เปลี่ยนช่องทาง</button>
                            <div className="bg-white border border-neutral-200 p-5 rounded-xl text-sm whitespace-pre-line">
                                {paymentMethod === 'bank' && settings.pageB}
                                {paymentMethod === 'wallet' && settings.pageC}
                                {paymentMethod === 'paypal' && settings.pageD}
                            </div>
                            <div className="bg-white border border-neutral-200 p-5 rounded-xl space-y-4">
                                <div>
                                    <label className="block text-xs font-semibold mb-2">แนบภาพสลิป</label>
                                    <label className="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed rounded-lg cursor-pointer hover:bg-neutral-50">
                                        <IconUpload />
                                        <p className="text-xs text-neutral-500">{slipMeta ? slipMeta.name : "เลือกรูปถ่าย"}</p>
                                        <input type="file" accept="image/*" onChange={handleFileChange} className="hidden" />
                                    </label>
                                </div>
                                <div>
                                    <label className="block text-xs font-semibold mb-2">เวลาโอน (ชั่วโมง:นาที)</label>
                                    <input type="time" value={transferTime} onChange={(e) => setTransferTime(e.target.value)} className="w-full border p-2.5 rounded-lg text-sm" />
                                </div>
                            </div>
                            <button onClick={handleRequestJoin} disabled={isSubmitting} className="w-full bg-black text-white py-3 rounded-lg font-bold text-sm disabled:bg-neutral-400">
                                {isSubmitting ? "กำลังดำเนินการ..." : "แจ้งโอนเงิน"}
                            </button>
                        </div>
                    )}

                    {step === 4 && (
                        <div className="text-center p-6 bg-white border border-neutral-200 rounded-xl mt-6">
                            <div className="flex justify-center mb-4"><IconCheck /></div>
                            <h2 className="text-lg font-bold">บันทึกข้อมูลสำเร็จ!</h2>
                            <p className="text-sm text-neutral-500 mt-2">กรุณารอแอดมินตรวจสอบ ระบบจะส่งลิงก์เข้ากลุ่มให้ทางแชทครับ</p>
                        </div>
                    )}
                </div>
            );
        }

        function MemberView({ user }) {
            const expiry = user.expiryDate ? user.expiryDate.toDate() : new Date();
            const daysLeft = Math.ceil((expiry.getTime() - new Date().getTime()) / (1000 * 3600 * 24));

            return (
                <div className="flex-1 p-5 flex flex-col justify-center">
                    <div className="bg-white border-2 border-black rounded-2xl p-6 shadow-md text-center">
                        <span className="text-[10px] font-black uppercase text-neutral-400">VIP MEMBER PASS</span>
                        <h2 className="text-2xl font-black mt-1">{user?.name}</h2>
                        <div className="my-8 bg-neutral-50 p-4 rounded-xl border border-neutral-100">
                            <span className="text-xs text-neutral-400 font-semibold">วันใช้งานคงเหลือ</span>
                            <div className="text-4xl font-extrabold mt-1">{daysLeft > 0 ? daysLeft : 0} วัน</div>
                        </div>
                        <div className="text-xs text-neutral-600 text-left space-y-2 border-t pt-4">
                            <div className="flex justify-between"><span>แพ็กเกจ</span><span className="font-bold">{user?.package?.name}</span></div>
                            <div className="flex justify-between"><span>หมดอายุ</span><span className="font-bold">{expiry.toLocaleDateString('th-TH')}</span></div>
                        </div>
                    </div>
                </div>
            );
        }

        function AdminView({ tgUser, packages, settings }) {
            const [tab, setTab] = useState('pending');
            const [pendingTxs, setPendingTxs] = useState([]);
            const [members, setMembers] = useState([]);

            const [tempPageA, setTempPageA] = useState(settings.pageA);
            const [tempPageB, setTempPageB] = useState(settings.pageB);
            const [tempPageC, setTempPageC] = useState(settings.pageC);
            const [tempPageD, setTempPageD] = useState(settings.pageD);

            useEffect(() => {
                if(!db) return;
                const unsubTxs = db.collection('transactions').where('status', '==', 'pending').onSnapshot(snap => {
                    setPendingTxs(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                const unsubMembers = db.collection('users').onSnapshot(snap => {
                    setMembers(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                return () => { unsubTxs(); unsubMembers(); };
            }, []);

            const handleApprove = async (tx) => {
                if (!confirm("อนุมัติรายการนี้ใช่หรือไม่?")) return;
                try {
                    const res = await fetch(GAS_WEB_APP_URL, {
                        method: 'POST', body: JSON.stringify({ action: 'approve', tgUserId: tx.userId })
                    });
                    const result = await res.json();
                    if(!result.success) throw new Error("GAS Error");

                    await db.collection('transactions').doc(tx.id).update({ status: 'approved' });
                    
                    const expiry = new Date();
                    expiry.setDate(expiry.getDate() + parseInt(tx.package.days));
                    await db.collection('users').doc(tx.userId).set({
                        userId: tx.userId, name: tx.userName, status: 'active',
                        package: tx.package, expiryDate: expiry
                    }, { merge: true });

                    alert("อนุมัติสำเร็จ!");
                } catch (e) { alert("ล้มเหลว: " + e.message); }
            };

            const handleReject = async (tx) => {
                if (!confirm("ปฏิเสธรายการนี้ใช่หรือไม่?")) return;
                await db.collection('transactions').doc(tx.id).update({ status: 'rejected' });
            };

            const handleSaveSettings = async () => {
                await db.collection('system').doc('settings').update({
                    textSettings: { pageA: tempPageA, pageB: tempPageB, pageC: tempPageC, pageD: tempPageD }
                });
                alert("บันทึกสำเร็จ");
            };

            return (
                <div className="flex-1 flex flex-col">
                    <div className="bg-black text-white p-4 font-bold">ADMIN DASHBOARD</div>
                    <div className="flex bg-white border-b sticky top-0">
                        <button onClick={()=>setTab('pending')} className={`flex-1 p-3 text-xs font-bold ${tab==='pending'?'border-b-2 border-black':''}`}>รออนุมัติ ({pendingTxs.length})</button>
                        <button onClick={()=>setTab('members')} className={`flex-1 p-3 text-xs font-bold ${tab==='members'?'border-b-2 border-black':''}`}>สมาชิก</button>
                        <button onClick={()=>setTab('settings')} className={`flex-1 p-3 text-xs font-bold ${tab==='settings'?'border-b-2 border-black':''}`}>ตั้งค่า</button>
                    </div>

                    <div className="p-4">
                        {tab === 'pending' && pendingTxs.map(tx => (
                            <div key={tx.id} className="bg-white p-4 rounded-xl border mb-3">
                                <h4 className="font-bold">{tx.userName}</h4>
                                <div className="text-xs my-2 text-neutral-600">แพ็กเกจ: {tx.package?.name} <br/> เวลาโอน: {tx.transferTime} น. <br/> ช่องทาง: {tx.paymentMethod}</div>
                                {tx.slipUrl && <a href={tx.slipUrl} target="_blank" className="text-blue-500 text-xs underline block mb-3">ดูสลิปโอนเงิน</a>}
                                <div className="flex space-x-2">
                                    <button onClick={()=>handleApprove(tx)} className="flex-1 bg-black text-white py-2 rounded text-xs font-bold">อนุมัติ</button>
                                    <button onClick={()=>handleReject(tx)} className="flex-1 bg-red-500 text-white py-2 rounded text-xs font-bold">ปฏิเสธ</button>
                                </div>
                            </div>
                        ))}
                        {tab === 'members' && members.map(m => (
                            <div key={m.id} className="bg-white p-3 rounded border mb-2 flex justify-between items-center">
                                <span className="font-bold text-sm">{m.name}</span>
                                <span className={`text-xs px-2 py-1 rounded ${m.status==='active'?'bg-black text-white':'bg-red-100'}`}>{m.status}</span>
                            </div>
                        ))}
                        {tab === 'settings' && (
                            <div className="bg-white p-4 rounded border space-y-3">
                                <div><label className="text-xs font-bold">หน้า A</label><textarea value={tempPageA} onChange={e=>setTempPageA(e.target.value)} className="w-full border p-2 text-sm mt-1"/></div>
                                <div><label className="text-xs font-bold">ธนาคาร (หน้า B)</label><textarea value={tempPageB} onChange={e=>setTempPageB(e.target.value)} className="w-full border p-2 text-sm mt-1"/></div>
                                <div><label className="text-xs font-bold">TrueMoney (หน้า C)</label><textarea value={tempPageC} onChange={e=>setTempPageC(e.target.value)} className="w-full border p-2 text-sm mt-1"/></div>
                                <div><label className="text-xs font-bold">Paypal (หน้า D)</label><textarea value={tempPageD} onChange={e=>setTempPageD(e.target.value)} className="w-full border p-2 text-sm mt-1"/></div>
                                <button onClick={handleSaveSettings} className="w-full bg-black text-white py-2 rounded font-bold text-sm">บันทึก</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
