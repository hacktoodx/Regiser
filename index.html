<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Subscription - สมัครสมาชิก</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [loading, setLoading] = useState(true);
            const [tgUser, setTgUser] = useState(null);
            const [packages, setPackages] = useState([]);
            const [settings, setSettings] = useState({});
            
            // ส่วนของฟอร์ม
            const [step, setStep] = useState(1);
            const [selectedPkg, setSelectedPkg] = useState(null);
            const [transferTime, setTransferTime] = useState("");
            const [file, setFile] = useState(null);
            const [statusMsg, setStatusMsg] = useState("");

            useEffect(() => {
                const user = window.Telegram?.WebApp?.initDataUnsafe?.user || { id: 12345, first_name: "ผู้ใช้จำลอง" };
                setTgUser(user);

                // ตรวจสอบสิทธิ์ (ถ้าสิทธิ์ตรง ให้เด้งไปหน้าของบทบาทนั้นๆ)
                if (user.id.toString() === ADMIN_TG_ID) {
                    window.location.href = "admin.html"; // ย้ายไปหน้าแอดมิน
                    return;
                }

                db.collection("users").doc(user.id.toString()).onSnapshot(doc => {
                    if (doc.exists && doc.data().status === "active") {
                        const expiry = doc.data().expiryDate?.toDate();
                        if (expiry && expiry > new Date()) {
                            window.location.href = "member.html"; // ย้ายไปหน้าสมาชิก VIP
                            return;
                        }
                    }
                    // ถ้าไม่ใช่ทั้งคู่ แสดงว่าเป็น Guest ให้โหลดหน้าสมัครต่อ
                    setLoading(false);
                });

                // โหลดแพ็กเกจ
                db.collection("system").doc("settings").onSnapshot(doc => {
                    if (doc.exists) {
                        setSettings(doc.data().textSettings || {});
                        setPackages(doc.data().packages || []);
                    }
                });
            }, []);

            const handleUploadAndSubmit = async (e) => {
                e.preventDefault();
                if (!file || !transferTime) return alert("กรุณากรอกข้อมูลให้ครบถ้วน");
                setLoading(true);
                setStatusMsg("กำลังอัปโหลดสลิป...");

                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onloadend = async () => {
                    const base64Data = reader.result.split(',')[1];
                    const response = await fetch(GAS_WEB_APP_URL, {
                        method: "POST",
                        body: JSON.stringify({ action: "upload_slip", filename: `slip_${tgUser.id}.png`, filedata: base64Data })
                    });
                    const result = await response.json();
                    
                    if (result.status === "success") {
                        await db.collection("transactions").add({
                            userId: tgUser.id.toString(),
                            userName: tgUser.first_name,
                            package: selectedPkg,
                            transferTime: transferTime,
                            slipUrl: result.url,
                            status: "pending",
                            timestamp: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        setStep(3);
                    } else {
                        alert("เกิดข้อผิดพลาดในการส่งสลิป");
                    }
                    setLoading(false);
                };
            };

            if (loading) return <div class="p-8 text-center text-xs text-slate-400">กำลังตรวจสอบสิทธิ์ทางเข้า...</div>;

            return (
                <div class="p-4 max-w-md mx-auto">
                    {step === 1 && (
                        <div>
                            <div class="text-center my-6">
                                <h1 class="text-2xl font-black text-blue-600">💎 VIP MEMBER GROUP</h1>
                                <p class="text-xs text-slate-500 mt-1">{settings.pageA || "เลือกแพ็กเกจที่ต้องการ"}</p>
                            </div>
                            <div class="space-y-3">
                                {packages.map(pkg => (
                                    <div key={pkg.id} onClick={() => { setSelectedPkg(pkg); setStep(2); }} class="bg-white border p-4 rounded-2xl flex justify-between items-center cursor-pointer shadow-sm hover:border-blue-500">
                                        <div>
                                            <div class="font-bold">{pkg.name}</div>
                                            <div class="text-xs text-slate-400">{pkg.days} วัน</div>
                                        </div>
                                        <div class="font-black text-blue-600">{pkg.price} ฿</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {step === 2 && (
                        <div class="bg-white p-5 rounded-2xl shadow-sm border">
                            <h2 class="text-lg font-bold text-center mb-4">💰 แจ้งโอนเงิน</h2>
                            <p class="text-xs text-slate-600 mb-4 bg-slate-50 p-3 rounded-xl">{settings.pageB}</p>
                            <form onSubmit={handleUploadAndSubmit} class="space-y-4">
                                <input type="text" placeholder="เวลาที่โอน เช่น 14:35 น." value={transferTime} onChange={e => setTransferTime(e.target.value)} class="w-full border rounded-xl p-2.5 text-sm" required />
                                <input type="file" accept="image/*" onChange={e => setFile(e.target.files[0])} class="w-full text-xs" required />
                                <button type="submit" class="w-full bg-blue-600 text-white rounded-xl p-3 font-bold text-sm">{statusMsg || "🚀 ส่งหลักฐาน"}</button>
                            </form>
                            <button onClick={() => setStep(1)} class="w-full text-center text-xs text-slate-400 mt-4 underline">ย้อนกลับ</button>
                        </div>
                    )}

                    {step === 3 && (
                        <div class="text-center py-12 bg-white rounded-2xl border p-6">
                            <h2 class="text-xl font-bold text-emerald-600">ส่งข้อมูลเรียบร้อย!</h2>
                            <p class="text-xs text-slate-500 mt-2">กรุณารอแอดมินตรวจสอบ บอทจะส่งลิงก์เข้ากลุ่มให้ทางแชทครับ</p>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
