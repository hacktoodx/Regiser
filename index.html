<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIP Group Subscription</title>
    
    <!-- SDK & Core Library สำหรับสถาปัตยกรรมแบบ Single-File -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Firebase SDK Compat (ป้องกันการใช้ import ป้องกันปัญหา Browser Block) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <!-- ระบบดักจับข้อผิดพลาดฉุกเฉิน ป้องกันปัญหาหน้าจอขาวเงียบ -->
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            const errDiv = document.getElementById('startup-error');
            const errText = document.getElementById('error-text');
            if (errDiv && errText) {
                errDiv.classList.remove('hidden');
                errText.innerHTML = "<strong>System Log:</strong><br>" + message + 
                                    "<br><br><small class='text-neutral-500'>บรรทัดที่: " + lineno + "</small>";
            }
            return false;
        };
    </script>

    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #fafafa;
            color: #171717;
            -webkit-tap-highlight-color: transparent;
        }
        /* Custom Scrollbar for Premium Feel */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 99px;
        }
    </style>
</head>
<body class="antialiased select-none">

    <!-- ส่วนจัดเก็บกรณีเกิดข้อผิดพลาดระดับลึก -->
    <div id="startup-error" class="hidden p-6 text-center bg-red-50 min-h-screen flex flex-col justify-center items-center">
        <div class="text-red-500 text-5xl mb-4">⚠️</div>
        <h1 class="text-lg font-bold text-red-700">พบข้อผิดพลาดในการโหลดระบบ</h1>
        <p id="error-text" class="text-sm text-neutral-600 mt-2 max-w-xs leading-relaxed font-mono text-left bg-neutral-100 p-3 rounded border border-neutral-200 overflow-auto w-full"></p>
    </div>

    <!-- จุดที่ React จะนำหน้าต่าง UI ไปเรนเดอร์ -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // ⚙️ SYSTEM CONFIGURATION (ข้อมูลดั้งเดิมของคุณ)
        // ==========================================
        const ADMIN_TG_ID = "7234688831"; 
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwpgFr425h5sFIfRcXdnZl_lp1__ir7zTUkR53-Zj8bNtYQ_hO_7qlU6aeIGyYlGsX/exec";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAxHBeocnF00uoHiMUqMyY2ZgAx9ALVFQI",
            authDomain: "hacktood-member.firebaseapp.com",
            projectId: "hacktood-member",
            storageBucket: "hacktood-member.firebasestorage.app",
            messagingSenderId: "67545978384",
            appId: "1:67545978384:web:5e13a0549263fadb7d5c95",
            measurementId: "G-Q430JLX5J7"
        };

        // เริ่มต้นการเชื่อมต่อฐานข้อมูล
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // สั่งเปิดขยายหน้าจอ Telegram WebApp
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        // --- ไอคอน SVG ป้องกันปัญหา Crash ของ React ---
        const IconCrown = () => (
            <svg class="w-8 h-8 text-white animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" />
            </svg>
        );
        const IconArrowLeft = () => (
            <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
        );
        const IconChevronRight = () => (
            <svg class="w-4 h-4 text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" />
            </svg>
        );
        const IconUpload = () => (
            <svg class="w-7 h-7 text-neutral-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
            </svg>
        );
        const IconCheck = () => (
            <svg class="w-12 h-12 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
            </svg>
        );

        // ==========================================
        // 📦 MODULE 1: COMPONENT FOR GUEST (หน้าจอผู้ใช้ธรรมดา / สมัครสมาชิก)
        // ==========================================
        function GuestFlow({ tgUser, packages, settings }) {
            const [step, setStep] = useState(1); // 1: เลือกแพ็กเกจ, 2: เลือกช่องทางชำระเงิน, 3: แนบหลักฐานสลิป, 4: สำเร็จ
            const [selectedPkg, setSelectedPkg] = useState(null);
            const [paymentMethod, setPaymentMethod] = useState(""); // bank, wallet, paypal
            const [transferTime, setTransferTime] = useState("");
            const [file, setFile] = useState(null);
            const [fileNameText, setFileNameText] = useState("เลือกภาพสลิปการโอน");
            const [loading, setLoading] = useState(false);
            const [statusMsg, setStatusMsg] = useState("");

            const handleSelectPackage = (pkg) => {
                setSelectedPkg(pkg);
                setStep(2);
            };

            const handleSelectMethod = (method) => {
                setPaymentMethod(method);
                setStep(3);
            };

            const handleFileChange = (e) => {
                const selectedFile = e.target.files[0];
                if (selectedFile) {
                    setFile(selectedFile);
                    setFileNameText(selectedFile.name);
                }
            };

            const handleUploadAndSubmit = async (e) => {
                e.preventDefault();
                if (!file || !transferTime) {
                    alert("กรุณากรอกเวลาโอนและแนบรูปสลิปให้ครบถ้วน");
                    return;
                }

                setLoading(true);
                setStatusMsg("กำลังส่งภาพหลักฐานไปยังระบบคลาวด์...");

                try {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onloadend = async () => {
                        const base64Data = reader.result;
                        
                        // ส่งรูปขึ้น Google Drive ผ่าน GAS
                        const response = await fetch(GAS_WEB_APP_URL, {
                            method: "POST",
                            body: JSON.stringify({
                                action: "upload_slip",
                                mimeType: file.type,
                                filename: `slip_${tgUser.id}_${Date.now()}.png`,
                                base64: base64Data
                            })
                        });
                        
                        const result = await response.json();
                        
                        if (result.success) {
                            setStatusMsg("กำลังบันทึกข้อมูลคิวคำขอ...");
                            
                            // บันทึกข้อมูลและ URL รูปสลิปลง Firestore
                            await db.collection("transactions").add({
                                userId: tgUser.id.toString(),
                                userName: tgUser.first_name || "Guest User",
                                package: selectedPkg,
                                paymentMethod: paymentMethod,
                                transferTime: transferTime,
                                slipUrl: result.fileUrl,
                                status: "pending",
                                timestamp: firebase.firestore.FieldValue.serverTimestamp()
                            });

                            setStep(4);
                        } else {
                            throw new Error("ล้มเหลวในการบันทึกรูปภาพสลิป");
                        }
                    };
                } catch (error) {
                    alert("เกิดข้อผิดพลาด: " + error.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div class="p-6 max-w-md mx-auto min-h-screen flex flex-col justify-between">
                    
                    {step === 1 && (
                        <div class="transition-all duration-300">
                            {/* Minimalist Logo / Icon Area */}
                            <div class="text-center my-10 space-y-3">
                                <div class="inline-flex items-center justify-center w-16 h-14 bg-black text-white rounded-full text-xl font-black tracking-widest border border-neutral-800 shadow-md">
                                    VIP
                                </div>
                                <h1 class="text-2xl font-black tracking-tight text-neutral-900 uppercase">Premium Group</h1>
                                <p class="text-xs text-neutral-500 font-medium max-w-[280px] mx-auto leading-relaxed">
                                    {settings.pageA || "เลือกแผนสมาชิกสมาชิก VIP Group ที่คุณสะดวกและทำรายการด้านล่างได้ทันที"}
                                </p>
                            </div>

                            {/* Package Cards Section */}
                            <div class="space-y-3 mt-4">
                                {packages.map(pkg => (
                                    <button 
                                        key={pkg.id} 
                                        onClick={() => handleSelectPackage(pkg)} 
                                        class="w-full bg-white border border-neutral-200/80 p-5 rounded-2xl flex justify-between items-center text-left shadow-sm hover:border-black active:scale-[0.98] transition-all group duration-300"
                                    >
                                        <div class="space-y-1">
                                            <div class="font-bold text-neutral-900">{pkg.name}</div>
                                            <div class="text-[11px] text-neutral-400 font-semibold">{pkg.days} วันใช้งาน VIP</div>
                                        </div>
                                        <div class="text-right">
                                            <div class="font-black text-xl text-neutral-900">฿{pkg.price}</div>
                                        </div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {step === 2 && (
                        <div class="space-y-4 my-auto">
                            <button onClick={() => setStep(1)} class="flex items-center text-xs font-bold text-neutral-400 hover:text-black mb-4">
                                <IconArrowLeft /> ย้อนกลับแผนสมาชิก
                            </button>

                            <div class="bg-black text-white p-5 rounded-2xl text-center shadow-lg">
                                <span class="text-[9px] font-black uppercase text-neutral-400 tracking-widest">แผนสมาชิกที่เลือก</span>
                                <h3 class="font-black text-lg mt-1">{selectedPkg?.name}</h3>
                                <div class="text-2xl font-black mt-2">฿{selectedPkg?.price}</div>
                            </div>

                            <p class="text-xs text-neutral-400 font-bold uppercase tracking-wider mt-6 mb-2">เลือกช่องทางการชำระเงิน</p>
                            
                            <div class="space-y-3">
                                <div onClick={() => handleSelectMethod("bank")} class="p-4 bg-white border border-neutral-200 rounded-2xl flex justify-between items-center cursor-pointer hover:border-black transition-all active:scale-[0.98]">
                                    <span class="font-bold text-sm text-neutral-800">🏦 โอนผ่านบัญชีธนาคาร</span>
                                    <IconChevronRight />
                                </div>
                                <div onClick={() => handleSelectMethod("wallet")} class="p-4 bg-white border border-neutral-200 rounded-2xl flex justify-between items-center cursor-pointer hover:border-black transition-all active:scale-[0.98]">
                                    <span class="font-bold text-sm text-neutral-800">📱 โอนทรูมันนี่วอลเล็ต</span>
                                    <IconChevronRight />
                                </div>
                                <div onClick={() => handleSelectMethod("paypal")} class="p-4 bg-white border border-neutral-200 rounded-2xl flex justify-between items-center cursor-pointer hover:border-black transition-all active:scale-[0.98]">
                                    <span class="font-bold text-sm text-neutral-800">💳 ชำระผ่าน PayPal</span>
                                    <IconChevronRight />
                                </div>
                            </div>
                        </div>
                    )}

                    {step === 3 && (
                        <div class="bg-white border border-neutral-200/60 p-6 rounded-3xl shadow-sm my-auto space-y-6">
                            <div class="flex justify-between items-center">
                                <button onClick={() => setStep(2)} class="flex items-center text-xs font-bold text-neutral-400 hover:text-black">
                                    <IconArrowLeft /> ช่องทางอื่น
                                </button>
                                <span class="bg-neutral-100 text-neutral-800 text-[9px] font-bold px-2 py-0.5 rounded-full uppercase">
                                    {paymentMethod} Method
                                </span>
                            </div>

                            {/* Payment details box */}
                            <div class="bg-neutral-50 border border-neutral-200/40 p-4 rounded-2xl text-xs text-neutral-600 space-y-2 whitespace-pre-line leading-relaxed font-semibold">
                                {paymentMethod === "bank" && (settings.pageB || "ข้อมูลธนาคารเพื่อการโอนชำระ\nกรุณาตั้งค่าบัญชีในแผงจัดการระบบ")}
                                {paymentMethod === "wallet" && (settings.pageC || "ข้อมูลทรูมันนี่วอลเล็ต\nกรุณาตั้งค่าบัญชีในแผงจัดการระบบ")}
                                {paymentMethod === "paypal" && (settings.pageD || "ข้อมูลหรืออีเมลสำหรับโอนผ่าน PayPal\nกรุณาตั้งค่าบัญชีในแผงจัดการระบบ")}
                                
                                <div class="border-t border-neutral-200/60 pt-3 mt-3 flex justify-between items-center">
                                    <span class="text-[10px] text-neutral-400 uppercase tracking-wider font-bold">ยอดเงินที่ต้องโอน</span>
                                    <span class="text-base font-black text-black">฿{selectedPkg?.price}</span>
                                </div>
                            </div>
                            
                            <form onSubmit={handleUploadAndSubmit} class="space-y-4">
                                <div class="space-y-1.5">
                                    <label class="block text-[10px] font-bold text-neutral-400 uppercase tracking-wider">เวลาที่โอนเงินในสลิป</label>
                                    <input 
                                        type="text" 
                                        placeholder="ตัวอย่างเช่น 14:35 น." 
                                        value={transferTime} 
                                        onChange={e => setTransferTime(e.target.value)} 
                                        class="w-full border border-neutral-200 rounded-xl p-3 text-sm focus:outline-none focus:border-black transition-all bg-neutral-50/50 font-medium" 
                                        required 
                                    />
                                </div>

                                <div class="space-y-1.5">
                                    <label class="block text-[10px] font-bold text-neutral-400 uppercase tracking-wider">อัปโหลดภาพหลักฐานการโอน</label>
                                    <div class="relative border-2 border-dashed border-neutral-200 rounded-2xl p-4 text-center hover:bg-neutral-50 transition-colors cursor-pointer bg-neutral-50/20">
                                        <input 
                                            type="file" 
                                            accept="image/*" 
                                            onChange={handleFileChange} 
                                            class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" 
                                            required 
                                        />
                                        <div class="space-y-1">
                                            <div class="flex justify-center"><IconUpload /></div>
                                            <p class="text-xs font-bold text-neutral-700">
                                                {file ? "✓ แนบหลักฐานแล้ว" : "เลือกภาพสลิปโอนเงิน"}
                                            </p>
                                            <p class="text-[10px] text-neutral-400 max-w-[180px] mx-auto overflow-hidden text-ellipsis whitespace-nowrap">
                                                {file ? file.name : "รองรับไฟล์ภาพ .png, .jpg, .jpeg"}
                                            </p>
                                        </div>
                                    </div>
                                </div>

                                <button 
                                    type="submit" 
                                    disabled={loading} 
                                    class="w-full bg-neutral-900 text-white rounded-2xl p-3.5 font-bold text-xs uppercase tracking-wider hover:bg-black disabled:bg-neutral-300 shadow-md shadow-black/10 transition-all active:scale-[0.98] mt-2"
                                >
                                    {loading ? statusMsg : "ยืนยันและแจ้งโอนเงิน"}
                                </button>
                            </form>
                        </div>
                    )}

                    {step === 4 && (
                        <div class="text-center py-16 px-6 bg-white rounded-3xl border border-neutral-200/40 shadow-sm my-auto space-y-6">
                            <div class="inline-flex items-center justify-center w-14 h-14 bg-neutral-100 text-neutral-900 rounded-full text-xl shadow-inner shadow-black/5">
                                <IconCheck />
                            </div>
                            <div class="space-y-2">
                                <h2 class="text-xl font-bold text-neutral-900">ส่งข้อมูลเรียบร้อยแล้ว</h2>
                                <p class="text-xs text-neutral-400 max-w-[240px] mx-auto leading-relaxed font-medium">
                                    ระบบได้บันทึกประวัติและส่งใบแจ้งโอนให้แอดมินตรวจสอบแล้ว กรุณารอรับลิงก์เชิญเข้ากลุ่มทางช่องทางแชทของ Telegram Bot ครับ
                                </p>
                            </div>
                        </div>
                    )}
                    
                    <div class="text-center py-4 text-[10px] text-neutral-400 font-medium">
                        VIP Premium Monochrome App • Powered by Telegram SDK
                    </div>
                </div>
            );
        }


    // ==========================================
    // 💳 MODULE 2: COMPONENT FOR MEMBERS (หน้าบัตร VIP สมาชิกที่ชำระเงินแล้ว)
    // ==========================================
    function MemberView({ tgUser, userData }) {
        const formatDate = (timestamp) => {
            if (!timestamp) return "-";
            const date = timestamp.toDate();
            return date.toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });
        };

        const getDaysRemaining = (timestamp) => {
            if (!timestamp) return 0;
            const diffTime = timestamp.toDate() - new Date();
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            return diffDays > 0 ? diffDays : 0;
        };

        return (
            <div class="p-6 max-w-md mx-auto min-h-screen flex flex-col justify-between">
                <div></div>
                <div class="space-y-6">
                    {/* Luxury Monochrome Membership Card */}
                    <div class="bg-gradient-to-br from-neutral-950 via-neutral-900 to-neutral-950 text-white p-6 rounded-3xl shadow-xl relative overflow-hidden border border-neutral-800 shadow-black/30">
                        {/* Abstract metallic ambient circles */}
                        <div class="absolute -right-6 -bottom-6 w-32 h-32 bg-white/5 rounded-full blur-xl"></div>
                        <div class="absolute -left-6 -top-6 w-32 h-32 bg-white/5 rounded-full blur-xl"></div>
                        
                        <div class="flex justify-between items-start">
                            <div class="space-y-1.5">
                                <span class="bg-white/10 text-white border border-white/15 text-[9px] uppercase font-bold tracking-widest px-2.5 py-1 rounded-full">
                                    VIP MEMBER PASS
                                </span>
                                <h2 class="text-xl font-black mt-2 tracking-tight">{tgUser?.first_name}</h2>
                                <p class="text-[9px] text-neutral-500 font-bold tracking-wider">ID: {tgUser?.id}</p>
                            </div>
                            <div class="text-xl font-bold tracking-widest opacity-80">VIP</div>
                        </div>
                        
                        <div class="my-6 text-center py-4 bg-white/5 rounded-2xl border border-white/10">
                            <span class="text-[9px] text-neutral-400 font-black uppercase tracking-wider">วันใช้งานคงเหลือ</span>
                            <div class="text-3xl font-black text-neutral-100 mt-1">{getDaysRemaining(userData?.expiryDate)} วัน</div>
                        </div>

                        <div class="pt-4 border-t border-white/10 flex justify-between items-end">
                            <div>
                                <p class="text-[9px] text-neutral-500 uppercase tracking-widest font-bold">วันหมดอายุสมาชิก</p>
                                <p class="text-[11px] font-bold text-neutral-100">{formatDate(userData?.expiryDate)}</p>
                            </div>
                            <div class="bg-white/10 px-3 py-1 rounded-xl border border-white/10">
                                <p class="text-[10px] text-neutral-100 font-black tracking-wide">● ACTIVE</p>
                            </div>
                        </div>
                    </div>

                    <div class="text-center space-y-1">
                        <h3 class="font-bold text-neutral-800">ขอบคุณที่เป็นครอบครัว VIP</h3>
                        <p class="text-[11px] text-neutral-400 max-w-[260px] mx-auto leading-relaxed">
                            คุณสามารถใช้งานห้องแชทและอัปเดตข้อมูลพรีเมียมจากเราได้อย่างไร้ขีดจำกัด
                        </p>
                    </div>
                </div>
                
                <div class="text-center py-4 text-[10px] text-neutral-400 font-medium">
                    VIP Premium System • Powered by Telegram Mini App
                </div>
            </div>
        );
    }


    // ==========================================
    // 👑 MODULE 3: COMPONENT FOR ADMINS (แผงควบคุมแอดมินสำหรับจัดการสลิป)
    // ==========================================
    function AdminDashboard({ settings }) {
        const [tab, setTab] = useState("pending");
        const [txs, setTxs] = useState([]);
        const [vipUsers, setVipUsers] = useState([]);
        const [allUsersCount, setAllUsersCount] = useState(0);
        const [loadingId, setLoadingId] = useState(null);

        // State สำหรับช่องทางการตั้งค่าข้อความแสดงผล
        const [tempPageA, setTempPageA] = useState(settings.pageA || "");
        const [tempPageB, setTempPageB] = useState(settings.pageB || "");
        const [tempPageC, setTempPageC] = useState(settings.pageC || "");
        const [tempPageD, setTempPageD] = useState(settings.pageD || "");

        // State สำหรับสถิติวัน
        const [statsCount, setStatsCount] = useState(0);
        const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]);

        useEffect(() => {
            // โหลดสลิปค้างอนุมัติเรียลไทม์
            const unsubTxs = db.collection("transactions").orderBy("timestamp", "desc").onSnapshot(snapshot => {
                setTxs(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            });
            // โหลดรายชื่อผู้ใช้ VIP เรียลไทม์
            const unsubUsers = db.collection("users").onSnapshot(snapshot => {
                setVipUsers(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
            });
            // นับจำนวนผู้ใช้ทั้งหมดในระบบ
            const unsubAllUsers = db.collection("all_users").onSnapshot(snapshot => {
                setAllUsersCount(snapshot.size);
            });
            return () => { unsubTxs(); unsubUsers(); unsubAllUsers(); };
        }, []);

        useEffect(() => {
            setTempPageA(settings.pageA || "");
            setTempPageB(settings.pageB || "");
            setTempPageC(settings.pageC || "");
            setTempPageD(settings.pageD || "");
        }, [settings]);

        useEffect(() => {
            // ดึงสถิติจำนวนคนเข้าใช้งานรายวันตามวันที่เลือก
            const unsubStats = db.collection("stats").doc(selectedDate).onSnapshot(doc => {
                if (doc.exists) {
                    setStatsCount(doc.data().count || 0);
                } else {
                    setStatsCount(0);
                }
            });
            return () => unsubStats();
        }, [selectedDate]);

        const handleApprove = async (tx) => {
            if (!confirm(`ต้องการอนุมัติรายการชำระเงินของ ${tx.userName} หรือไม่?\nระบบจะสร้างลิงก์เชิญพิเศษชิ้นใหม่และส่งให้ผู้ใช้โดยอัตโนมัติ`)) return;
            setLoadingId(tx.id);

            try {
                // เรียกใช้งาน GAS เพื่อส่งคำเชิญ Telegram แบบใช้ได้ครั้งเดียว
                const response = await fetch(GAS_WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "approve",
                        tgUserId: tx.userId.toString(),
                        packageName: tx.package.name
                    })
                });
                const resJson = await response.json();

                if (resJson.success) {
                    // คำนวณวันหมดอายุบันทึกลง Firestore
                    const daysToAdd = parseInt(tx.package.days) || 30;
                    const finalExpiry = new Date();
                    finalExpiry.setDate(finalExpiry.getDate() + daysToAdd);

                    await db.collection("users").doc(tx.userId.toString()).set({
                        userId: tx.userId.toString(),
                        name: tx.userName,
                        status: "active",
                        package: tx.package,
                        expiryDate: firebase.firestore.Timestamp.fromDate(finalExpiry)
                    });

                    await db.collection("transactions").doc(tx.id).update({ status: "approved" });
                    alert("อนุมัติสำเร็จ! ระบบส่งลิงก์เชิญเข้ากลุ่มให้ผู้ใช้เรียบร้อยแล้ว");
                } else {
                    alert("ระบบหลังบ้านขัดข้อง: " + (resJson.error || "ไม่สามารถดึงข้อมูลคีย์ลิงก์ได้"));
                }
            } catch (err) {
                alert("ล้มเหลว: " + err.message);
            } finally {
                setLoadingId(null);
            }
        };

        const handleReject = async (tx) => {
            const reason = prompt("ระบุเหตุผลการปฏิเสธหลักฐาน (ข้อความนี้จะถูกส่งไปที่บอทฝั่งลูกค้า):", "หลักฐานไม่ถูกต้องหรือภาพซ้ำ");
            if (reason === null) return;
            
            setLoadingId(tx.id);
            try {
                // แจ้งเตือนผู้ใช้ผ่านบอทด้วยสคริปต์ GAS
                await fetch(GAS_WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify({ 
                        action: "reject", 
                        tgUserId: tx.userId.toString(),
                        reason: reason 
                    })
                });
                
                await db.collection("transactions").doc(tx.id).update({ 
                    status: "rejected",
                    rejectReason: reason
                });
                alert("ปฏิเสธรายการแล้ว บอทได้ทำการส่งข้อความชี้แจงไปที่ผู้สมัครเรียบร้อย");
            } catch (err) {
                alert("ล้มเหลว: " + err.message);
            } finally {
                setLoadingId(null);
            }
        };

        const handleSaveSettings = async () => {
            try {
                await db.collection("system").doc("settings").update({
                    textSettings: {
                        pageA: tempPageA,
                        pageB: tempPageB,
                        pageC: tempPageC,
                        pageD: tempPageD
                    }
                });
                alert("บันทึกการตั้งค่าลงระบบ Firebase สำเร็จ!");
            } catch (e) {
                alert("ล้มเหลว: " + e.message);
            }
        };

        const handleEditExpiry = async (user) => {
            const daysInput = prompt(`เพิ่ม/ลด จำนวนวันสมาชิกของคุณ ${user.name} (กรอกตัวเลข เช่น 30 เพื่อเพิ่ม หรือ -30 เพื่อลดวัน):`);
            if (!daysInput || isNaN(daysInput)) return;

            try {
                const currentExpiry = user.expiryDate ? user.expiryDate.toDate() : new Date();
                const newExpiry = new Date(currentExpiry);
                newExpiry.setDate(newExpiry.getDate() + parseInt(daysInput));

                await db.collection("users").doc(user.userId).update({
                    expiryDate: firebase.firestore.Timestamp.fromDate(newExpiry),
                    status: newExpiry > new Date() ? 'active' : 'expired'
                });
                alert("อัปเดตระยะเวลาสมาชิกเรียบร้อย!");
            } catch (err) {
                alert("ล้มเหลว: " + err.message);
            }
        };

        return (
            <div class="p-6 max-w-lg mx-auto min-h-screen flex flex-col justify-between">
                <div class="space-y-6">
                    <div class="bg-black text-white p-4 rounded-2xl text-center shadow-md">
                        <h1 class="text-xs font-black tracking-widest uppercase">🛡️ Admin Control Panel</h1>
                    </div>

                    {/* Switch Tab Menu */}
                    <div class="flex space-x-1.5 bg-neutral-200/60 p-1 rounded-2xl text-[10px] font-bold">
                        <button onClick={() => setTab("pending")} class={`flex-1 p-2 rounded-xl transition-all duration-300 ${tab === 'pending' ? 'bg-white text-neutral-900 shadow-sm' : 'text-neutral-500'}`}>รอตรวจสอบ ({txs.filter(t=>t.status==='pending').length})</button>
                        <button onClick={() => setTab("users")} class={`flex-1 p-2 rounded-xl transition-all duration-300 ${tab === 'users' ? 'bg-white text-neutral-900 shadow-sm' : 'text-neutral-500'}`}>สมาชิก ({vipUsers.filter(u=>u.status==='active').length})</button>
                        <button onClick={() => setTab("settings")} class={`flex-1 p-2 rounded-xl transition-all duration-300 ${tab === 'settings' ? 'bg-white text-neutral-900 shadow-sm' : 'text-neutral-500'}`}>ตั้งค่าระบบ</button>
                        <button onClick={() => setTab("dashboard")} class={`flex-1 p-2 rounded-xl transition-all duration-300 ${tab === 'dashboard' ? 'bg-white text-neutral-900 shadow-sm' : 'text-neutral-500'}`}>แดชบอร์ด</button>
                    </div>

                    {tab === "pending" && (
                        <div class="space-y-3">
                            {txs.filter(t => t.status === "pending").length === 0 ? (
                                <p class="text-center text-xs text-neutral-400 py-10 font-medium">ไม่มีรายการคำแจ้งโอนที่รอดำเนินการ</p>
                            ) : (
                                txs.filter(t => t.status === "pending").map(tx => (
                                    <div key={tx.id} class="bg-white border border-neutral-200 p-5 rounded-2xl shadow-sm space-y-4">
                                        <div class="flex justify-between items-start border-b border-neutral-100 pb-3 text-xs font-semibold">
                                            <div class="space-y-0.5">
                                                <p class="font-extrabold text-neutral-900">{tx.userName}</p>
                                                <p class="text-[10px] text-neutral-400">ID: {tx.userId}</p>
                                            </div>
                                            <div class="text-right">
                                                <p class="font-black text-neutral-900">฿{tx.package?.price}</p>
                                                <p class="text-[10px] text-neutral-400">โอน: {tx.transferTime} น. ({tx.paymentMethod})</p>
                                            </div>
                                        </div>
                                        
                                        <div class="border border-neutral-200 rounded-lg overflow-hidden">
                                            <a href={tx.slipUrl} target="_blank" rel="noopener noreferrer" class="block text-center py-2 bg-neutral-100 text-xs font-bold text-neutral-700 hover:bg-neutral-200">
                                                🔍 คลิกตรวจสอบภาพสลิปใบโอนเงิน
                                            </a>
                                        </div>

                                        <div class="flex space-x-2 pt-1.5">
                                            <button 
                                                onClick={() => handleApprove(tx)} 
                                                disabled={loadingId !== null} 
                                                class="flex-1 bg-black text-white rounded-xl p-2.5 font-bold text-xs hover:bg-neutral-900 disabled:bg-neutral-300 transition-colors"
                                            >
                                                {loadingId === tx.id ? "กำลังส่ง..." : "อนุมัติ"}
                                            </button>
                                            <button 
                                                onClick={() => handleReject(tx)} 
                                                disabled={loadingId !== null} 
                                                class="flex-1 border border-neutral-200 text-neutral-600 rounded-xl p-2.5 font-bold text-xs hover:bg-neutral-50 disabled:bg-neutral-300 transition-colors"
                                            >
                                                ปฏิเสธ
                                            </button>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    )}

                    {tab === "users" && (
                        <div class="space-y-3">
                            <h3 class="text-xs font-bold text-neutral-400 uppercase tracking-wider mb-2">รายชื่อสมาชิก VIP ที่ใช้งานอยู่</h3>
                            {vipUsers.filter(u=>u.status==='active').map(user => (
                                <div key={user.id} class="p-4 bg-white border border-neutral-200 rounded-2xl flex justify-between items-center text-xs font-medium">
                                    <div class="space-y-0.5">
                                        <p class="font-bold text-neutral-900">{user.name}</p>
                                        <p class="text-[10px] text-neutral-400">
                                            หมดอายุ: {user.expiryDate ? user.expiryDate.toDate().toLocaleDateString('th-TH') : "N/A"}
                                        </p>
                                    </div>
                                    <button onClick={() => handleEditExpiry(user)} class="border border-neutral-300 px-3 py-1.5 rounded-lg text-[10px] font-bold bg-neutral-50 hover:bg-neutral-100">
                                        ⚙️ เพิ่ม/ลดวัน
                                    </button>
                                </div>
                            ))}
                            {vipUsers.filter(u=>u.status==='active').length === 0 && (
                                <p class="text-center text-xs text-neutral-400 py-10 font-medium">ยังไม่มีสมาชิก VIP ที่เปิดใช้งาน</p>
                            )}
                        </div>
                    )}

                    {tab === "settings" && (
                        <div class="bg-white border border-neutral-200 p-5 rounded-2xl space-y-4 shadow-sm">
                            <h3 class="text-xs font-bold text-neutral-400 uppercase tracking-wider">ตั้งค่าเนื้อหาแสดงผล</h3>
                            
                            <div>
                                <label class="block text-[10px] font-bold text-neutral-400 uppercase tracking-wider mb-1">ข้อความหน้าแนะนำ (Page A)</label>
                                <textarea value={tempPageA} onChange={(e) => setTempPageA(e.target.value)} rows="2" class="w-full border border-neutral-200 p-2.5 rounded-xl text-xs focus:outline-none focus:border-black font-semibold" />
                            </div>

                            <div>
                                <label class="block text-[10px] font-bold text-neutral-400 uppercase tracking-wider mb-1">ช่องทางโอนเงินธนาคาร (Page B)</label>
                                <textarea value={tempPageB} onChange={(e) => setTempPageB(e.target.value)} rows="3" class="w-full border border-neutral-200 p-2.5 rounded-xl text-xs focus:outline-none focus:border-black font-semibold" />
                            </div>

                            <div>
                                <label class="block text-[10px] font-bold text-neutral-400 uppercase tracking-wider mb-1">ช่องทาง TrueMoney Wallet (Page C)</label>
                                <textarea value={tempPageC} onChange={(e) => setTempPageC(e.target.value)} rows="2" class="w-full border border-neutral-200 p-2.5 rounded-xl text-xs focus:outline-none focus:border-black font-semibold" />
                            </div>

                            <div>
                                <label class="block text-[10px] font-bold text-neutral-400 uppercase tracking-wider mb-1">ช่องทาง PayPal (Page D)</label>
                                <textarea value={tempPageD} onChange={(e) => setTempPageD(e.target.value)} rows="2" class="w-full border border-neutral-200 p-2.5 rounded-xl text-xs focus:outline-none focus:border-black font-semibold" />
                            </div>

                            <button onClick={handleSaveSettings} class="w-full bg-black text-white font-bold py-3 rounded-xl text-xs uppercase tracking-wider mt-4">
                                บันทึกการเปลี่ยนแปลงทั้งหมด
                            </button>
                        </div>
                    )}

                    {tab === "dashboard" && (
                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-3">
                                <div class="bg-white p-4 border border-neutral-200 rounded-2xl text-center">
                                    <span class="text-[9px] uppercase font-bold text-neutral-400 tracking-wider">รายชื่อผู้ใช้บอททั้งหมด</span>
                                    <div class="text-2xl font-black text-neutral-900 mt-1">{allUsersCount} คน</div>
                                </div>
                                <div class="bg-white p-4 border border-neutral-200 rounded-2xl text-center">
                                    <span class="text-[9px] uppercase font-bold text-neutral-400 tracking-wider">สมาชิกที่ยังไม่หมดอายุ</span>
                                    <div class="text-2xl font-black text-neutral-900 mt-1">
                                        {vipUsers.filter(u=>u.status==='active').length} คน
                                    </div>
                                </div>
                            </div>

                            <div class="bg-white p-5 border border-neutral-200 rounded-2xl space-y-4">
                                <h4 class="text-xs font-bold uppercase text-neutral-400 tracking-wider">สถิติจำนวนคนเข้าบอทรายวัน</h4>
                                <div>
                                    <input 
                                        type="date" 
                                        value={selectedDate} 
                                        onChange={(e) => setSelectedDate(e.target.value)} 
                                        class="w-full border border-neutral-200 p-2.5 rounded-xl text-xs font-semibold"
                                    />
                                </div>
                                <div class="bg-neutral-50 p-4 rounded-xl text-center">
                                    <span class="text-[10px] text-neutral-400 font-bold uppercase">คนกดเข้าบอทวันนี้:</span>
                                    <div class="text-3xl font-black text-black mt-1">{statsCount} ราย</div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
                
                <div class="text-center py-4 text-[10px] text-neutral-400 font-medium">
                    VIP Premium Dashboard • Powered by Telegram Mini App
                </div>
            </div>
        );
    }


    // ==========================================
    // 🔄 ROOT APPLICATION ROUTER (ตัวสับเปลี่ยนสิทธิ์ตามบทบาทผู้ใช้)
    // ==========================================
    function App() {
        const [role, setRole] = useState("loading"); // loading, guest, member, admin
        const [tgUser, setTgUser] = useState(null);
        const [userData, setUserData] = useState(null);
        const [packages, setPackages] = useState([]);
        const [settings, setSettings] = useState({});

        useEffect(() => {
            // ดึงตัวตนผู้ใช้งานจาก Telegram WebApp SDK
            const user = window.Telegram?.WebApp?.initDataUnsafe?.user || { id: 12345, first_name: "Test User" };
            setTgUser(user);

            // บันทึกสถิติผู้ใช้งานลงในทะเบียนหลักของ Firebase เพื่อให้แอดมินใช้ส่ง Broadcast
            db.collection("all_users").doc(user.id.toString()).set({
                id: user.id.toString(),
                name: user.first_name || "Unknown",
                lastSeen: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });

            // ตรวจสอบคัดแยกบทบาทสิทธิ์ (Role Router)
            if (user.id.toString() === ADMIN_TG_ID) {
                setRole("admin");
            } else {
                db.collection("users").doc(user.id.toString()).onSnapshot(doc => {
                    if (doc.exists && doc.data().status === "active") {
                        const expiry = doc.data().expiryDate?.toDate();
                        if (expiry && expiry > new Date()) {
                            setUserData(doc.data());
                            setRole("member");
                        } else {
                            setRole("guest"); // อายุสมาชิกสิ้นสุด ย้ายกลับไปหน้าเลือกแพ็กเกจ
                        }
                    } else {
                        setRole("guest"); // ผู้ใช้งานรายใหม่
                    }
                });
            }

            // ดึงการตั้งค่าเนื้อหาและแพ็กเกจราคาทั้งหมด (แสดง 3 แพ็กเกจ ขาว-เทา-ดำ)
            db.collection("system").doc("settings").onSnapshot(doc => {
                if (doc.exists) {
                    setSettings(doc.data().textSettings || {});
                    setPackages(doc.data().packages || [
                        { id: "p1", name: "สมาชิก 1 เดือน", days: "30", price: "300" },
                        { id: "p2", name: "สมาชิก 3 เดือน", days: "90", price: "500" },
                        { id: "p3", name: "สมาชิก 6 เดือน", days: "180", price: "700" }
                    ]);
                } else {
                    // บันทึกชุดข้อมูลเริ่มต้นหากยังไม่พบข้อมูลในตาราง Firestore
                    const defaultSettings = {
                        packages: [
                            { id: "p1", name: "สมาชิก 1 เดือน", days: "30", price: "300" },
                            { id: "p2", name: "สมาชิก 3 เดือน", days: "90", price: "500" },
                            { id: "p3", name: "สมาชิก 6 เดือน", days: "180", price: "700" }
                        ],
                        textSettings: {
                            pageA: "เลือกแผนสมาชิกสมาชิก VIP Group ที่คุณสะดวกและทำรายการด้านล่างได้ทันที",
                            pageB: "โอนผ่านบัญชีธนาคารกสิกรไทย\nเลขบัญชี: 123-4-56789-0\nชื่อบัญชี: บจก. พรีเมียม ออฟฟิเชียล\n(กรุณาโอนเงินตรงตามยอดและส่งสลิปเพื่ออนุมัติสิทธิ์อัตโนมัติ)",
                            pageC: "โอนผ่าน TrueMoney Wallet\nเบอร์บัญชี: 080-123-4567\nชื่อบัญชี: บจก. พรีเมียม ออฟฟิเชียล",
                            pageD: "ชำระเงินผ่านระบบ PayPal\nส่งยอดมาที่อีเมล: payment@premium.com\n(กรุณาแนบภาพสลิปทำรายการด้านล่าง)"
                        }
                    };
                    db.collection("system").doc("settings").set(defaultSettings);
                }
            });

        }, []);

        if (role === "loading") {
            return (
                <div class="flex flex-col justify-center items-center min-h-screen text-neutral-400 text-xs font-bold space-y-3">
                    <div class="animate-spin rounded-full h-5 w-5 border-2 border-neutral-300 border-t-black"></div>
                    <p class="text-[9px] uppercase tracking-wider text-neutral-400">Loading VIP System...</p>
                </div>
            );
        }

        return (
            <div class="max-w-md mx-auto min-h-screen bg-neutral-50 flex flex-col relative">
                {role === "guest" && <GuestFlow tgUser={tgUser} packages={packages} settings={settings} />}
                {role === "member" && <MemberView tgUser={tgUser} userData={userData} />}
                {role === "admin" && <AdminDashboard settings={settings} />}
            </div>
        );
    }

    // เชื่อมโยงและสั่งเรนเดอร์ React Component เข้ากับ Element root หลัก
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
