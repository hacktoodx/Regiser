<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Member Pass</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [userData, setUserData] = useState(null);
            const [tgUser, setTgUser] = useState(null);

            useEffect(() => {
                const user = window.Telegram?.WebApp?.initDataUnsafe?.user || { id: 12345, first_name: "ผู้ใช้จำลอง" };
                setTgUser(user);

                // ดึงข้อมูลสมาชิก
                db.collection("users").doc(user.id.toString()).get().then(doc => {
                    if (doc.exists && doc.data().status === "active") {
                        setUserData(doc.data());
                    } else {
                        window.location.href = "index.html"; // ถ้าไม่มีสิทธิ์ให้เด้งกลับหน้าแรก
                    }
                });
            }, []);

            if (!userData) return <div class="p-8 text-center text-xs">กำลังโหลดบัตร VIP...</div>;

            return (
                <div class="p-6 max-w-md mx-auto">
                    <div class="bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 text-white p-6 rounded-3xl shadow-xl border border-amber-500/30">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="bg-amber-500/20 text-amber-400 border border-amber-500/40 text-[10px] uppercase font-bold tracking-widest px-2.5 py-0.5 rounded-full">VIP MEMBER PASS</span>
                                <h2 class="text-xl font-black mt-2">{tgUser.first_name}</h2>
                                <p class="text-[10px] text-slate-400">ID: {tgUser.id}</p>
                            </div>
                            <div class="text-2xl">💎</div>
                        </div>
                        <div class="mt-10 pt-4 border-t border-white/10 flex justify-between items-end">
                            <div>
                                <p class="text-[9px] text-slate-400 uppercase">วันหมดอายุสมาชิก pass</p>
                                <p class="text-sm font-bold text-amber-300">
                                    {userData.expiryDate ? userData.expiryDate.toDate().toLocaleDateString('th-TH') : "-"}
                                </p>
                            </div>
                            <span class="text-xs text-emerald-400 font-bold">● ACTIVE</span>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
