<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [txs, setTxs] = useState([]);
            const [loadingId, setLoadingId] = useState(null);

            useEffect(() => {
                const user = window.Telegram?.WebApp?.initDataUnsafe?.user || { id: 7234688831 }; // ค่า Default ให้เทสได้
                if (user.id.toString() !== ADMIN_TG_ID) {
                    alert("คุณไม่มีสิทธิ์เข้าถึงหน้านี้");
                    window.location.href = "index.html";
                    return;
                }

                // ดึงรายการรออนุมัติ
                return db.collection("transactions").orderBy("timestamp", "desc").onSnapshot(snapshot => {
                    setTxs(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
            }, []);

            const handleApprove = async (tx) => {
                if (!confirm("ยืนยันการอนุมัติ?")) return;
                setLoadingId(tx.id);
                try {
                    const response = await fetch(GAS_WEB_APP_URL, {
                        method: "POST",
                        body: JSON.stringify({ action: "approve", tgUserId: tx.userId.toString(), packageName: tx.package.name })
                    });
                    const resJson = await response.json();

                    if(resJson.status === "success") {
                        const daysToAdd = parseInt(tx.package.days) || 30;
                        const finalExpiry = new Date();
                        finalExpiry.setDate(finalExpiry.getDate() + daysToAdd);

                        await db.collection("users").doc(tx.userId.toString()).set({
                            userId: tx.userId.toString(),
                            name: tx.userName,
                            status: "active",
                            package: tx.package,
                            expiryDate: firebase.firestore.Timestamp.fromDate(finalExpiry)
                        });
                        await db.collection("transactions").doc(tx.id).update({ status: "approved" });
                        alert("อนุมัติสำเร็จ!");
                    }
                } catch (err) { alert(err.message); }
                setLoadingId(null);
            };

            return (
                <div class="p-4 max-w-md mx-auto">
                    <div class="bg-slate-900 text-white p-4 rounded-2xl mb-4 text-center">
                        <h1 class="font-bold">🛡️ ระบบแอดมิน ตรวจสอบสลิป</h1>
                    </div>
                    <div class="space-y-3">
                        {txs.filter(t => t.status === "pending").map(tx => (
                            <div key={tx.id} class="bg-white border p-4 rounded-xl shadow-sm space-y-2">
                                <div class="text-xs">
                                    <p class="font-bold">ผู้โอน: {tx.userName} (ID: {tx.userId})</p>
                                    <p class="text-blue-600 font-bold">ยอด: {tx.package?.price} บ. | เวลา: {tx.transferTime}</p>
                                </div>
                                <a href={tx.slipUrl} target="_blank" rel="noreferrer" class="text-xs text-blue-500 underline block">👁️ คลิกดูรูปสลิปในไดรฟ์</a>
                                <button onClick={() => handleApprove(tx)} disabled={loadingId !== null} class="w-full bg-emerald-600 text-white rounded-lg p-2 font-bold text-xs disabled:bg-slate-300">
                                    {loadingId === tx.id ? "กำลังประมวลผล..." : "✅ อนุมัติสิทธิ์ VIP"}
                                </button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
